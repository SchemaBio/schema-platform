# Schema Platform - Docker Compose 配置
#
# 使用方法:
#   ./start.sh               # 启动所有服务
#   ./start.sh germline      # 只启动 Germline
#   ./start.sh somatic       # 只启动 Somatic
#   ./start.sh --external-db # 使用外部数据库

services:
  # ============================================
  # PostgreSQL 数据库 (内置)
  # ============================================
  postgres:
    image: postgres:18-alpine
    profiles: ["all"]
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-schema_platform}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不暴露端口，仅内部网络使用

  # ============================================
  # Germline 前端
  # ============================================
  web-germline:
    image: ghcr.io/schemabio/schema-germline:latest
    profiles: ["germline", "all"]
    ports:
      - "${GERMLINE_WEB_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080/api
    depends_on:
      backend:
        condition: service_healthy

  # ============================================
  # Somatic 前端
  # ============================================
  web-somatic:
    image: ghcr.io/schemabio/schema-somatic:latest
    profiles: ["somatic", "all"]
    ports:
      - "${SOMATIC_WEB_PORT:-3002}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080/api
    depends_on:
      backend:
        condition: service_healthy

  # ============================================
  # 后端 (Octopus)
  # ============================================
  backend:
    image: ghcr.io/schemabio/schema-backend:latest
    profiles: ["germline", "somatic", "all"]
    environment:
      - DB_DSN=host=${POSTGRES_HOST:-postgres} user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-schema_platform} port=${POSTGRES_PORT:-5432} sslmode=disable TimeZone=Asia/Shanghai
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
